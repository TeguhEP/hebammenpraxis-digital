backend:
  name: github
  repo: TeguhEP/hebammenpraxis-digital
  branch: main
  base_url: https://www.hebammenpraxis-digital.de
  auth_endpoint: api/auth

media_folder: "admin/uploads"
public_folder: "/admin/uploads"

collections:
  - name: "blog_de"
    label: "Blog (Deutsch)"
    folder: "src/de/blog"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Titel", name: "title", widget: "string" }
      - { label: "Beschreibung", name: "description", widget: "string" }
      - { label: "Kategorie", name: "category", widget: "select", options: ["Kassenleistung", "IGeL", "Schwangerschaft", "Geburt", "Wochenbett", "Ratgeber"] }
      - { label: "Autor", name: "author", widget: "string", default: "Raisa Shofia, B.Sc." }
      - { label: "Datum", name: "date", widget: "datetime" }
      - { label: "Layout", name: "layout", widget: "hidden", default: "blog-post.njk" }
      - { label: "Tags", name: "tags", widget: "hidden", default: "blog_de" }
      - { label: "Inhalt", name: "body", widget: "markdown" }
  
  - name: "blog_id"
    label: "Blog (Indonesia)"
    folder: "src/id/blog"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Judul", name: "title", widget: "string" }
      - { label: "Deskripsi", name: "description", widget: "text" }
      - { label: "Kategori", name: "category", widget: "select", options: ["Ditanggung Asuransi", "IGeL / Privat", "Kehamilan", "Persalinan", "Masa Nifas"] }
      - { label: "Penulis", name: "author", widget: "string", default: "Raisa Shofia, B.Sc." }
      - { label: "Tanggal", name: "date", widget: "datetime" }
      - { label: "Layout", name: "layout", widget: "hidden", default: "blog-post-id.njk" }
      - { label: "Tags", name: "tags", widget: "hidden", default: "blog_id" }
      - { label: "Konten", name: "body", widget: "markdown" }

  - name: "blog_en"
    label: "Blog (English)"
    folder: "src/en/blog"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Category", name: "category", widget: "select", options: ["Health Insurance", "Private / IGeL", "Pregnancy", "Birth", "Postnatal"] }
      - { label: "Author", name: "author", widget: "string", default: "Raisa Shofia, B.Sc." }
      - { label: "Date", name: "date", widget: "datetime" }
      - { label: "Layout", name: "layout", widget: "hidden", default: "blog-post-en.njk" }
      - { label: "Tags", name: "tags", widget: "hidden", default: "blog_en" }
      - { label: "Content", name: "body", widget: "markdown" }